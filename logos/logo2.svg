<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 90" width="520" height="90">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glows">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Texte tout en bleu électrique, effet néon -->
  <text x="20" y="58" font-family="'Courier New', monospace" font-size="46" font-weight="bold"
    fill="#003366" >~/ orchestrateur</text>
  <text x="20" y="58" font-family="'Courier New', monospace" font-size="46" font-weight="bold"
    fill="#00aaff" filter="url(#glow)" opacity="0.9">~/ orchestrateur</text>
  <!-- Ligne fine sous le texte -->
  <line x1="20" y1="68" x2="500" y2="68" stroke="#00aaff" stroke-width="1" opacity="0.35" filter="url(#glows)"/>
</svg>
