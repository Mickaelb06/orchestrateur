<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2soft">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cercle externe rotatif (style radar) -->
  <circle cx="60" cy="58" r="48" fill="none" stroke="#0044ff" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>
  <circle cx="60" cy="58" r="36" fill="none" stroke="#0077ff" stroke-width="1" stroke-dasharray="2 8" opacity="0.4"/>
  <circle cx="60" cy="58" r="22" fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.6" filter="url(#glow2soft)"/>

  <!-- Croix de visée -->
  <line x1="60" y1="10" x2="60" y2="36" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2soft)"/>
  <line x1="60" y1="80" x2="60" y2="106" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2soft)"/>
  <line x1="8" y1="58" x2="38" y2="58" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2soft)"/>
  <line x1="82" y1="58" x2="112" y2="58" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2soft)"/>

  <!-- Point central -->
  <circle cx="60" cy="58" r="5" fill="#00ffcc" filter="url(#glow2)"/>
  <circle cx="60" cy="58" r="2" fill="white" opacity="0.9"/>

  <!-- Arc décoratif haut-gauche -->
  <path d="M 25 25 Q 60 10 95 25" fill="none" stroke="#0066ff" stroke-width="1" opacity="0.5"/>

  <!-- Texte principal -->
  <text x="125" y="45" font-family="'Courier New', monospace" font-size="24" font-weight="bold"
    fill="url(#grad2)" filter="url(#glow2soft)" letter-spacing="2">ORCHESTRATEUR</text>

  <!-- Sous-titre avec effet terminal -->
  <text x="125" y="68" font-family="'Courier New', monospace" font-size="10"
    fill="#00ffcc" letter-spacing="4" opacity="0.7">&gt; SYSTEM ORCHESTRATION v2.0</text>

  <!-- Barres de progression style cyber -->
  <rect x="125" y="78" width="120" height="2" fill="#0033aa" opacity="0.5"/>
  <rect x="125" y="78" width="80" height="2" fill="url(#grad2)" opacity="0.8" filter="url(#glow2soft)"/>
  <rect x="125" y="83" width="80" height="1" fill="#0044ff" opacity="0.4"/>
  <rect x="125" y="83" width="45" height="1" fill="#00ffcc" opacity="0.6"/>

  <!-- Points décoratifs -->
  <circle cx="125" cy="94" r="2" fill="#00ffcc" opacity="0.6"/>
  <circle cx="133" cy="94" r="2" fill="#0077ff" opacity="0.6"/>
  <circle cx="141" cy="94" r="2" fill="#0044ff" opacity="0.4"/>
</svg>
