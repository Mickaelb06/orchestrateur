<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0044ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2s">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Radar cercles -->
  <circle cx="58" cy="58" r="50" fill="none" stroke="#0044ff" stroke-width="1" stroke-dasharray="4 6" opacity="0.4"/>
  <circle cx="58" cy="58" r="35" fill="none" stroke="#0077ff" stroke-width="1" stroke-dasharray="2 8" opacity="0.4"/>
  <circle cx="58" cy="58" r="20" fill="none" stroke="#00aaff" stroke-width="1.5" opacity="0.6" filter="url(#glow2s)"/>

  <!-- Visée -->
  <line x1="58" y1="8"  x2="58" y2="38" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2s)"/>
  <line x1="58" y1="78" x2="58" y2="108" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2s)"/>
  <line x1="8"  y1="58" x2="38" y2="58" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2s)"/>
  <line x1="78" y1="58" x2="108" y2="58" stroke="url(#grad2)" stroke-width="1.5" opacity="0.8" filter="url(#glow2s)"/>

  <circle cx="58" cy="58" r="5" fill="#00ffcc" filter="url(#glow2)"/>
  <circle cx="58" cy="58" r="2" fill="white" opacity="0.9"/>

  <!-- Texte -->
  <text x="122" y="55" font-family="'Courier New', monospace" font-size="36" font-weight="bold" filter="url(#glow2s)">
    <tspan fill="#00ffcc">~/</tspan><tspan fill="url(#grad2)"> orchestrateur</tspan>
  </text>

  <text x="122" y="74" font-family="'Courier New', monospace" font-size="10"
    fill="#00ffcc" letter-spacing="4" opacity="0.7">&gt; SYSTEM ORCHESTRATION v2.0</text>

  <!-- Barres -->
  <rect x="122" y="84" width="130" height="2" fill="#0033aa" opacity="0.4"/>
  <rect x="122" y="84" width="90" height="2" fill="url(#grad2)" opacity="0.8" filter="url(#glow2s)"/>
</svg>
