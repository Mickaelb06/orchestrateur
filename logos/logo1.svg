<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- ~/ en bleu vif, orchestrateur en blanc bleuté -->
  <text x="20" y="55" font-family="'Courier New', monospace" font-size="48" font-weight="bold"
    fill="#00aaff" filter="url(#glow)">~/</text>
  <text x="108" y="55" font-family="'Courier New', monospace" font-size="48" font-weight="bold"
    fill="#e0f4ff">orchestrateur</text>
  <!-- Underscore curseur -->
  <rect x="108" y="60" width="380" height="3" rx="1" fill="#00aaff" opacity="0.5"/>
</svg>
