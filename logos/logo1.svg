<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagone central -->
  <polygon points="60,10 90,27 90,63 60,80 30,63 30,27"
    fill="none" stroke="url(#grad1)" stroke-width="2" filter="url(#glow1)" opacity="0.9"/>
  <polygon points="60,20 80,31 80,59 60,70 40,59 40,31"
    fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>

  <!-- Noeud central -->
  <circle cx="60" cy="45" r="8" fill="url(#grad1)" filter="url(#glow1)"/>

  <!-- Lignes connecteurs -->
  <line x1="60" y1="10" x2="60" y2="20" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="90" y1="27" x2="80" y2="31" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="90" y1="63" x2="80" y2="59" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="60" y1="80" x2="60" y2="70" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="63" x2="40" y2="59" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="30" y1="27" x2="40" y2="31" stroke="#00d4ff" stroke-width="1.5" opacity="0.7"/>

  <!-- Petits noeuds aux sommets -->
  <circle cx="60" cy="10" r="3" fill="#00d4ff" filter="url(#glow1)"/>
  <circle cx="90" cy="27" r="3" fill="#00d4ff" filter="url(#glow1)"/>
  <circle cx="90" cy="63" r="3" fill="#00d4ff" filter="url(#glow1)"/>
  <circle cx="60" cy="80" r="3" fill="#00d4ff" filter="url(#glow1)"/>
  <circle cx="30" cy="63" r="3" fill="#00d4ff" filter="url(#glow1)"/>
  <circle cx="30" cy="27" r="3" fill="#00d4ff" filter="url(#glow1)"/>

  <!-- Texte -->
  <text x="115" y="38" font-family="'Courier New', monospace" font-size="26" font-weight="bold"
    fill="url(#grad1)" filter="url(#glow1)" letter-spacing="3">ORCHESTRATEUR</text>
  <text x="115" y="60" font-family="'Courier New', monospace" font-size="11"
    fill="#0099cc" letter-spacing="6" opacity="0.8">CYBER · ORCHESTRATION</text>

  <!-- Ligne décorative -->
  <line x1="115" y1="67" x2="385" y2="67" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <line x1="115" y1="70" x2="250" y2="70" stroke="#0066cc" stroke-width="0.5" opacity="0.3"/>
</svg>
