<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 90" width="520" height="90">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Accent vertical gauche -->
  <rect x="20" y="10" width="4" height="60" rx="2" fill="#00aaff" filter="url(#glow)"/>
  <!-- ~/ petit et haut, orchestrateur grand -->
  <text x="36" y="36" font-family="'Courier New', monospace" font-size="18" font-weight="bold"
    fill="#00aaff" filter="url(#glow)" letter-spacing="2">~/</text>
  <text x="36" y="72" font-family="'Courier New', monospace" font-size="38" font-weight="bold"
    fill="#00aaff" letter-spacing="1">orchestrateur</text>
</svg>
