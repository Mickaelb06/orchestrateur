<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cfff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0055ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cfff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow3s">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Bouclier -->
  <path d="M 58 8 L 93 22 L 93 55 Q 93 82 58 96 Q 23 82 23 55 L 23 22 Z"
    fill="none" stroke="url(#grad3)" stroke-width="2" filter="url(#glow3)" opacity="0.9"/>
  <path d="M 58 18 L 83 29 L 83 54 Q 83 74 58 85 Q 33 74 33 54 L 33 29 Z"
    fill="none" stroke="#0055ff" stroke-width="1" opacity="0.3"/>

  <!-- Circuit -->
  <line x1="58" y1="35" x2="58" y2="55" stroke="#00cfff" stroke-width="1.5" opacity="0.8" filter="url(#glow3s)"/>
  <line x1="43" y1="45" x2="73" y2="45" stroke="#00cfff" stroke-width="1.5" opacity="0.8" filter="url(#glow3s)"/>
  <line x1="43" y1="45" x2="43" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.6"/>
  <line x1="73" y1="45" x2="73" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.6"/>
  <line x1="43" y1="60" x2="73" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.5"/>

  <circle cx="58" cy="35" r="3.5" fill="#00cfff" filter="url(#glow3)"/>
  <circle cx="43" cy="45" r="2.5" fill="#0077ff" filter="url(#glow3s)"/>
  <circle cx="73" cy="45" r="2.5" fill="#0077ff" filter="url(#glow3s)"/>
  <circle cx="58" cy="55" r="4" fill="url(#grad3)" filter="url(#glow3)"/>
  <circle cx="43" cy="60" r="2" fill="#6600ff" opacity="0.8"/>
  <circle cx="73" cy="60" r="2" fill="#6600ff" opacity="0.8"/>

  <!-- Texte -->
  <text x="110" y="55" font-family="'Courier New', monospace" font-size="36" font-weight="bold" filter="url(#glow3s)">
    <tspan fill="#00cfff">~/</tspan><tspan fill="url(#grad3b)"> orchestrateur</tspan>
  </text>

  <!-- Ligne néon -->
  <line x1="110" y1="65" x2="415" y2="65" stroke="url(#grad3b)" stroke-width="1.5" opacity="0.6" filter="url(#glow3s)"/>

  <text x="110" y="81" font-family="'Courier New', monospace" font-size="10"
    fill="#00cfff" letter-spacing="5" opacity="0.75">SECURE · AUTOMATE · CONTROL</text>

  <!-- Tag code -->
  <rect x="110" y="90" width="90" height="16" rx="2" fill="none" stroke="#0055ff" stroke-width="1" opacity="0.5"/>
  <text x="115" y="102" font-family="'Courier New', monospace" font-size="9"
    fill="#00cfff" opacity="0.8">&lt;/orchestrate&gt;</text>
</svg>
