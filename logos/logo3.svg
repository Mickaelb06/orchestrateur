<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffaa"/>
      <stop offset="50%" style="stop-color:#0077ff"/>
      <stop offset="100%" style="stop-color:#aa00ff"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow3s">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Réseau de noeuds gauche -->
  <circle cx="20" cy="25" r="4" fill="url(#g3)" filter="url(#glow3)" opacity="0.9"/>
  <circle cx="55" cy="15" r="3" fill="#0077ff" filter="url(#glow3s)" opacity="0.8"/>
  <circle cx="75" cy="40" r="5" fill="url(#g3)" filter="url(#glow3)"/>
  <circle cx="45" cy="60" r="3" fill="#00ffaa" filter="url(#glow3s)" opacity="0.8"/>
  <circle cx="20" cy="75" r="4" fill="#aa00ff" filter="url(#glow3s)" opacity="0.7"/>
  <circle cx="65" cy="85" r="3" fill="#0077ff" filter="url(#glow3s)" opacity="0.7"/>
  <circle cx="90" cy="65" r="4" fill="url(#g3)" filter="url(#glow3)" opacity="0.85"/>
  <circle cx="95" cy="30" r="3" fill="#00ffaa" filter="url(#glow3s)" opacity="0.7"/>

  <!-- Connexions -->
  <line x1="20" y1="25" x2="55" y2="15" stroke="url(#g3)" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="15" x2="75" y2="40" stroke="url(#g3)" stroke-width="1" opacity="0.5"/>
  <line x1="75" y1="40" x2="95" y2="30" stroke="#0077ff" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="40" x2="90" y2="65" stroke="url(#g3)" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="25" x2="45" y2="60" stroke="#00ffaa" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="60" x2="75" y2="40" stroke="#0077ff" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="60" x2="20" y2="75" stroke="#aa00ff" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="60" x2="65" y2="85" stroke="#0077ff" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="85" x2="90" y2="65" stroke="url(#g3)" stroke-width="1" opacity="0.4"/>

  <!-- Texte -->
  <text x="115" y="62" font-family="'Courier New', monospace" font-size="38" font-weight="bold" fill="url(#g3)" filter="url(#glow3s)">~/</text>
  <text x="170" y="62" font-family="'Courier New', monospace" font-size="38" font-weight="bold" fill="url(#g3)" filter="url(#glow3s)"> orchestrateur</text>

  <!-- Double ligne déco -->
  <line x1="115" y1="76" x2="585" y2="76" stroke="url(#g3)" stroke-width="1.5" opacity="0.5" filter="url(#glow3s)"/>
  <line x1="115" y1="80" x2="360" y2="80" stroke="#0077ff" stroke-width="0.5" opacity="0.3"/>

  <text x="115" y="100" font-family="'Courier New', monospace" font-size="11"
    fill="#00ffaa" letter-spacing="5" opacity="0.65">NETWORK · INTELLIGENCE · OPS</text>
</svg>
