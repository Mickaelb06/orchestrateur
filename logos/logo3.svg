<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cfff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0055ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6600ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00cfff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6600ff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow3soft">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield / Bouclier stylisé -->
  <path d="M 60 8 L 95 22 L 95 55 Q 95 82 60 96 Q 25 82 25 55 L 25 22 Z"
    fill="none" stroke="url(#grad3)" stroke-width="2" filter="url(#glow3)" opacity="0.9"/>
  <path d="M 60 18 L 85 29 L 85 54 Q 85 74 60 85 Q 35 74 35 54 L 35 29 Z"
    fill="none" stroke="#0055ff" stroke-width="1" opacity="0.3"/>

  <!-- Circuit à l'intérieur du bouclier -->
  <line x1="60" y1="35" x2="60" y2="55" stroke="#00cfff" stroke-width="1.5" opacity="0.8" filter="url(#glow3soft)"/>
  <line x1="45" y1="45" x2="75" y2="45" stroke="#00cfff" stroke-width="1.5" opacity="0.8" filter="url(#glow3soft)"/>
  <line x1="45" y1="45" x2="45" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.6"/>
  <line x1="75" y1="45" x2="75" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.6"/>
  <line x1="45" y1="60" x2="75" y2="60" stroke="#0055ff" stroke-width="1" opacity="0.5"/>

  <!-- Noeuds circuit -->
  <circle cx="60" cy="35" r="3.5" fill="#00cfff" filter="url(#glow3)"/>
  <circle cx="45" cy="45" r="2.5" fill="#0077ff" filter="url(#glow3soft)"/>
  <circle cx="75" cy="45" r="2.5" fill="#0077ff" filter="url(#glow3soft)"/>
  <circle cx="60" cy="55" r="4" fill="url(#grad3)" filter="url(#glow3)"/>
  <circle cx="45" cy="60" r="2" fill="#6600ff" opacity="0.8"/>
  <circle cx="75" cy="60" r="2" fill="#6600ff" opacity="0.8"/>

  <!-- Texte ORCHESTRATEUR -->
  <text x="112" y="42" font-family="'Courier New', monospace" font-size="25" font-weight="bold"
    fill="url(#grad3b)" filter="url(#glow3soft)" letter-spacing="2">ORCHESTRATEUR</text>

  <!-- Ligne séparatrice néon -->
  <line x1="112" y1="52" x2="390" y2="52" stroke="url(#grad3b)" stroke-width="1.5" opacity="0.7" filter="url(#glow3soft)"/>

  <!-- Sous-titre -->
  <text x="112" y="68" font-family="'Courier New', monospace" font-size="10"
    fill="#00cfff" letter-spacing="5" opacity="0.75">SECURE · AUTOMATE · CONTROL</text>

  <!-- Tags style code -->
  <rect x="112" y="78" width="72" height="16" rx="2" fill="none" stroke="#0055ff" stroke-width="1" opacity="0.5"/>
  <text x="117" y="90" font-family="'Courier New', monospace" font-size="9"
    fill="#00cfff" opacity="0.8">&lt;/orchestrate&gt;</text>

  <rect x="192" y="78" width="44" height="16" rx="2" fill="none" stroke="#6600ff" stroke-width="1" opacity="0.4"/>
  <text x="197" y="90" font-family="'Courier New', monospace" font-size="9"
    fill="#9944ff" opacity="0.7">v2.0.0</text>
</svg>
